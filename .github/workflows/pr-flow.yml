name: PR Review and Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  auto-merge:
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/merge' &&
      github.event.comment.user.login == 'Uday-2611'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Verify PR is approved and checks pass
        run: |
          STATE=$(gh pr view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json reviewDecision,statusCheckRollup \
            --jq '.reviewDecision')
          if [ "$STATE" != "APPROVED" ]; then
            echo "PR is not approved. Merge blocked."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge the PR
        run: |
          gh pr merge ${{ github.event.issue.number }} \
            --squash \
            --delete-branch \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
